<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mijote — aperçu du loading screen d'import</title>
  <style>
    /* Couleurs reprises de src/app/globals.css */
    :root {
      --background: #F5F1E8;
      --foreground: #1A1A18;
      --muted-foreground: #6B6E68;
      --accent: #6E7A38;
      --border: #E5DED6;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--background);
      color: var(--foreground);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Reproduit le conteneur de NewRecipeFlow : max-w-2xl, px-4, pt-6 */
    .page { max-width: 42rem; margin: 0 auto; padding: 24px 16px 32px; }

    /* En-tête de l'écran (pour le contexte visuel) */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .back {
      width: 44px; height: 44px; border-radius: 9999px; border: none; cursor: pointer;
      background: transparent; color: var(--muted-foreground);
      display: flex; align-items: center; justify-content: center;
    }
    .title {
      font-family: "Fraunces", Georgia, serif; font-style: italic; font-weight: 500;
      font-size: 28px; letter-spacing: -0.015em;
    }

    /* === ImportLoading.tsx === */
    /* flex min-h-[55vh] flex-col items-center justify-center gap-5 text-center */
    .import-loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; min-height: 55vh; text-align: center;
    }
    .import-loading .spinner { color: var(--accent); animation: spin 1s linear infinite; }
    /* text-[15px] text-muted-foreground */
    .import-loading .message { font-size: 15px; color: var(--muted-foreground); margin: 0; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Petit sélecteur de message pour tester les deux libellés (hors composant) */
    .controls {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; background: #fff; border: 1px solid var(--border);
      padding: 6px; border-radius: 9999px; box-shadow: 0 4px 16px rgba(0,0,0,.08);
    }
    .controls button {
      border: none; cursor: pointer; border-radius: 9999px; padding: 8px 14px;
      font-size: 13px; background: transparent; color: var(--muted-foreground);
    }
    .controls button.active { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <button class="back" aria-label="Retour">
        <!-- lucide ArrowLeft -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
        </svg>
      </button>
      <h1 class="title">Nouvelle recette</h1>
    </div>

    <!-- === ImportLoading === -->
    <div class="import-loading">
      <!-- lucide Loader2, size 36 -->
      <svg class="spinner" width="36" height="36" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
      <p class="message" id="message">Extraction de la recette en cours…</p>
    </div>
  </div>

  <div class="controls">
    <button class="active" data-msg="Extraction de la recette en cours…">URL / capture</button>
    <button data-msg="Analyse de la recette…">Voix</button>
  </div>

  <script>
    const msg = document.getElementById("message");
    document.querySelectorAll(".controls button").forEach((b) => {
      b.addEventListener("click", () => {
        document.querySelectorAll(".controls button").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        msg.textContent = b.dataset.msg;
      });
    });
  </script>
</body>
</html>
